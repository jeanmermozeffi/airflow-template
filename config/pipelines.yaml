pipelines:
  ingestion:
    dag_id: ingestion_dag
    schedule: "0 2 * * *"
    owner: data-platform
    retries: 2
    retry_delay_minutes: 5
    tags: ["template", "ingestion"]
    required_connections: ["dwh_postgres"]

  transformation:
    dag_id: transformation_dag
    schedule: "0 3 * * *"
    owner: data-platform
    retries: 2
    retry_delay_minutes: 10
    tags: ["template", "transformation"]
    required_connections: ["dwh_postgres", "raw_postgres"]

  validation:
    dag_id: validation_dag
    schedule: "30 3 * * *"
    owner: data-platform
    retries: 1
    retry_delay_minutes: 5
    tags: ["template", "validation", "quality"]
    required_connections: ["dwh_postgres", "crm_mysql"]
