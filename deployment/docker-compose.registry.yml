services:
  airflow-project-api-${ENV}:
    image: ${REGISTRY_URL}/${REGISTRY_USERNAME}/${IMAGE_NAME}:${ENV}-${IMAGE_TAG:-latest}
    container_name: airflow-project-api-${ENV}
    env_file:
    - ../.env.${ENV}
    volumes:
    - ../.env.key:/app/.env.key:ro
    - ../.env.${ENV}.encrypted:/app/.env.${ENV}.encrypted:ro
    depends_on:
      airflow-project-redis-${ENV}:
        condition: service_healthy
    networks:
    - airflow-project-${ENV}-network
    restart: always
    labels:
    - project=${PROJECT_NAME}
    - environment=${ENV}
    - service=api
    - cic.project=airflow-project
    - cic.env=${ENV}
    - cic.service=api
    - image.source=registry
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:80/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  airflow-project-redis-${ENV}:
    image: redis:7-alpine
    container_name: airflow-project-redis-${ENV}
    volumes:
    - airflow-project-redis-${ENV}-data:/data
    networks:
    - airflow-project-${ENV}-network
    restart: unless-stopped
    labels:
    - project=${PROJECT_NAME}
    - environment=${ENV}
    - service=redis
    - cic.project=airflow-project
    - cic.env=${ENV}
    - cic.service=redis
    command: redis-server --appendonly yes
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
networks:
  airflow-project-${ENV}-network:
    name: airflow-project-${ENV}-network
    driver: bridge
volumes:
  airflow-project-redis-${ENV}-data:
    driver: local
    name: airflow-project-redis-${ENV}-data
