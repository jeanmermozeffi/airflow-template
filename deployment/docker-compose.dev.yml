services:
  airflow-project-api-dev:
    build:
      args:
      - ENABLE_RELOAD=true
    ports:
    - ${DEV_PORT:-8001}:80
    volumes:
    - ../${APP_SOURCE_DIR:-app}:${WORKDIR:-/app}/${APP_DEST_DIR:-app}:rw
    environment:
    - ENVIRONMENT=dev
    - LOG_LEVEL=DEBUG
    - RELOAD=true
    - FASTAPI_HOT_RELOAD=${FASTAPI_HOT_RELOAD:-true}
    - WATCHFILES_FORCE_POLLING=${WATCHFILES_FORCE_POLLING:-true}
    command: "sh -c \"if [ \\\"${FASTAPI_HOT_RELOAD:-true}\\\" = \\\"true\\\" ]; then\n  exec uvicorn ${APP_ENTRYPOINT:-app.main:app}\
      \ --host 0.0.0.0 --port 80 --reload --reload-dir ${WORKDIR:-/app}/${APP_DEST_DIR:-app};\nelse\n  exec uvicorn ${APP_ENTRYPOINT:-app.main:app}\
      \ --host 0.0.0.0 --port 80;\nfi\"\n"
    labels:
    - project=${PROJECT_NAME}
    - environment=dev
    - service=api
    - cic.project=airflow-project
    - cic.env=dev
    - cic.service=api
    - traefik.enable=false
  airflow-project-redis-dev:
    ports:
    - ${REDIS_DEV_PORT:-6379}:6379
    labels:
    - project=${PROJECT_NAME}
    - environment=dev
    - service=redis
    - cic.project=airflow-project
    - cic.env=dev
    - cic.service=redis
