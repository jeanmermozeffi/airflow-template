services:
  airflow-project-api-prod:
    ports:
    - ${PROD_PORT:-8000}:80
    environment:
    - ENVIRONMENT=prod
    - LOG_LEVEL=INFO
    - WORKERS=4
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    labels:
    - project=${PROJECT_NAME}
    - environment=prod
    - service=api
    - cic.project=airflow-project
    - cic.env=prod
    - cic.service=api
    - traefik.enable=true
    - traefik.http.routers.${PROJECT_NAME}-api-prod.rule=Host(`${PROD_DOMAIN:-api.localhost}`)
    - traefik.http.services.${PROJECT_NAME}-api-prod.loadbalancer.server.port=80
    - traefik.http.routers.${PROJECT_NAME}-api-prod.tls=true
    - traefik.http.routers.${PROJECT_NAME}-api-prod.tls.certresolver=letsencrypt
  airflow-project-redis-prod:
    labels:
    - project=${PROJECT_NAME}
    - environment=prod
    - service=redis
    - cic.project=airflow-project
    - cic.env=prod
    - cic.service=redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
