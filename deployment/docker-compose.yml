services:
  airflow-project-api-${ENV}:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.${ENV:-dev}
      args:
      - BUILD_ENV=${ENV:-dev}
      - REQUIREMENTS_PATH=${REQUIREMENTS_PATH:-requirements.txt}
      - APP_SOURCE_DIR=${APP_SOURCE_DIR:-app}
      - APP_DEST_DIR=${APP_DEST_DIR:-app}
      - APP_ENTRYPOINT=${APP_ENTRYPOINT:-app.main:app}
      - APP_PYTHON_PATH=${APP_PYTHON_PATH:-}
      - WORKDIR=${WORKDIR:-/app}
    image: ${IMAGE_NAME}:${ENV}-latest
    container_name: airflow-project-api-${ENV}
    env_file:
    - ../.env.${ENV}
    environment:
    - PYTHONPATH=${APP_PYTHON_PATH:-}
    - APP_ENTRYPOINT=${APP_ENTRYPOINT:-app.main:app}
    volumes:
    - ../.env.key:/app/.env.key:ro
    - ../.env.${ENV}.encrypted:/app/.env.${ENV}.encrypted:ro
    depends_on:
      airflow-project-redis-${ENV}:
        condition: service_healthy
    networks:
    - airflow-project-${ENV}-network
    restart: always
    labels:
    - project=${PROJECT_NAME}
    - environment=${ENV}
    - service=api
    - cic.project=airflow-project
    - cic.env=${ENV}
    - cic.service=api
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:80/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  airflow-project-redis-${ENV}:
    image: redis:7-alpine
    container_name: airflow-project-redis-${ENV}
    command: redis-server --appendonly yes
    volumes:
    - airflow-project-redis-${ENV}-data:/data
    networks:
    - airflow-project-${ENV}-network
    restart: unless-stopped
    labels:
    - project=${PROJECT_NAME}
    - environment=${ENV}
    - service=redis
    - cic.project=airflow-project
    - cic.env=${ENV}
    - cic.service=redis
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
networks:
  airflow-project-${ENV}-network:
    name: airflow-project-${ENV}-network
    driver: bridge
volumes:
  airflow-project-redis-${ENV}-data:
    driver: local
    name: airflow-project-redis-${ENV}-data
